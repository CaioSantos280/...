<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<title>Para: Alice</title>
<meta name="theme-color" content="#0e0a10">
<style>
  /* ============================================================
     TOKENS
     Conceito: uma carta escrita à mão, lida à luz de uma vela,
     dentro de um quarto escuro. Selo de cera pra revelar o nome,
     páginas de papel pra ler, e uma vela de verdade pra soprar
     no final.
  ============================================================ */
  :root{
    --bg:        #0e0a10;
    --bg-2:      #170f11;
    --paper:     #f3e7d2;
    --paper-2:   #ece0c9;
    --ink:       #3b2a1d;
    --ink-soft:  rgba(59,42,29,.62);
    --wax:       #9c3430;
    --wax-dark:  #6f231f;
    --gold:      #d7a25c;
    --ember:     #e3703e;
    --line:      rgba(243,231,210,.16);

    --font-serif: Georgia, 'Iowan Old Style', 'Palatino Linotype', 'Times New Roman', serif;
    --font-script: 'Segoe Script', 'Bradley Hand', 'Brush Script MT', 'Lucida Handwriting', cursive;
    --font-sans:  -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --font-mono:  'SF Mono', 'SFMono-Regular', Consolas, 'Courier New', monospace;

    --vh: 1vh;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; background:var(--bg); overflow:hidden; -webkit-tap-highlight-color:transparent; }
  body{
    font-family:var(--font-sans);
    color:var(--paper);
    position:relative;
    height:calc(var(--vh,1vh)*100);
    width:100%;
  }
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important; }
  }

  /* ============================================================
     FUNDO — quarto escuro com luz de vela / poeira flutuando
  ============================================================ */
  #room{ position:fixed; inset:0; z-index:0; }
  #dust{ position:fixed; inset:0; z-index:1; pointer-events:none; }

  .lamp-glow{
    position:fixed; inset:0; z-index:1; pointer-events:none;
    background: radial-gradient(60% 46% at 50% 38%, rgba(226,158,86,.16) 0%, rgba(226,158,86,0) 62%);
  }
  .vignette{
    position:fixed; inset:0; z-index:2; pointer-events:none;
    background: radial-gradient(120% 90% at 50% 50%, rgba(0,0,0,0) 40%, rgba(0,0,0,.6) 100%);
  }

  /* ============================================================
     PALCO
  ============================================================ */
  #stage{
    position:relative; z-index:3;
    height:100%; width:100%;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .scene{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    padding: 7vh 7vw;
    opacity:0; pointer-events:none;
    transition:opacity 1s ease;
  }
  .scene.active{ opacity:1; pointer-events:auto; }

  /* ============================================================
     FASE 1 — INTRO (sussurro no escuro)
  ============================================================ */
  .whisper{
    font-family:var(--font-serif);
    font-style:italic;
    font-size:clamp(1.25rem, 5vw, 2.15rem);
    line-height:1.55;
    color:var(--paper);
    max-width:21ch;
    opacity:0;
    transform:translateY(12px);
    transition:opacity 1.3s ease, transform 1.3s ease;
  }
  .whisper.show{ opacity:1; transform:translateY(0); }
  .whisper .cursor{
    display:inline-block;
    width:2px; height:1em;
    background:var(--gold);
    margin-left:2px;
    vertical-align:-.15em;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }

  /* ============================================================
     FASE 2 — ENVELOPE + SELO DE CERA
  ============================================================ */
  #scene-envelope .envelope-wrap{
    position:relative;
    width:min(78vw, 320px);
    aspect-ratio: 3/2;
    perspective: 900px;
  }
  .envelope-back{
    position:absolute; inset:0;
    background: linear-gradient(155deg, #d8c8a7, #c7b28a 60%, #b39d75);
    border-radius:6px;
    box-shadow: 0 25px 50px rgba(0,0,0,.55);
  }
  .envelope-flap{
    position:absolute; left:0; top:0; width:100%; height:56%;
    background: linear-gradient(155deg, #e6d7b6, #cdb98f 70%);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transform-origin: top center;
    transform: rotateX(0deg);
    transition: transform 1s cubic-bezier(.65,.05,.36,1);
    box-shadow: 0 6px 14px rgba(0,0,0,.25) inset;
  }
  .envelope-wrap.open .envelope-flap{ transform: rotateX(178deg); }

  .letter-peek{
    position:absolute;
    left:8%; right:8%; bottom:6%;
    height:0%;
    background: var(--paper);
    border-radius:3px 3px 0 0;
    box-shadow: 0 -6px 18px rgba(0,0,0,.25);
    transition: height 1.1s cubic-bezier(.22,.9,.32,1) .15s, transform 1.1s cubic-bezier(.22,.9,.32,1) .15s;
    overflow:hidden;
    display:flex; align-items:flex-end; justify-content:center;
    padding-bottom: 14%;
  }
  .envelope-wrap.open .letter-peek{ height:78%; transform:translateY(-14%); }

  .name-ink{
    font-family:var(--font-script);
    font-size:clamp(2.1rem, 9vw, 3.4rem);
    color:var(--ink);
    clip-path: inset(0 100% 0 0);
    white-space:nowrap;
  }
  .envelope-wrap.open .name-ink{
    animation: write-ink 1.6s cubic-bezier(.65,.05,.36,1) 1s forwards;
  }
  @keyframes write-ink{ to{ clip-path: inset(0 0 0 0); } }

  .seal{
    position:absolute;
    left:50%; top: 27%;
    transform: translate(-50%,-50%);
    width: 74px; height:74px;
    z-index:4;
    cursor:pointer;
    transition: opacity .5s ease, transform .6s ease;
  }
  .envelope-wrap.open .seal{ opacity:0; transform:translate(-50%,-50%) scale(.6) rotate(25deg); pointer-events:none; }
  .seal svg{ width:100%; height:100%; display:block; filter: drop-shadow(0 6px 10px rgba(0,0,0,.4)); }
  .seal .crack{ opacity:0; transition:opacity .3s ease; }
  .seal.cracking .crack{ opacity:1; }
  .seal.cracking{ animation: seal-shake .4s ease; }
  @keyframes seal-shake{
    0%,100%{ transform:translate(-50%,-50%) rotate(0); }
    25%{ transform:translate(-52%,-50%) rotate(-3deg); }
    75%{ transform:translate(-48%,-50%) rotate(3deg); }
  }

  .envelope-hint{
    margin-top: 2.6rem;
    font-family:var(--font-mono);
    font-size:.66rem;
    letter-spacing:.24em;
    text-transform:uppercase;
    color:var(--ink-soft);
    color: rgba(243,231,210,.55);
    opacity:0;
    transition:opacity 1s ease;
  }
  .envelope-hint.show{ opacity:1; animation:pulse-hint 2.2s ease-in-out infinite; }
  @keyframes pulse-hint{ 0%,100%{opacity:.35;} 50%{opacity:.85;} }

  /* ============================================================
     FASE 3 — PÁGINAS DA CARTA
  ============================================================ */
  #scene-letter{ perspective: 1200px; }
  .page-counter{
    font-family:var(--font-mono);
    font-size:.66rem;
    letter-spacing:.24em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:1.4rem;
    opacity:.9;
  }
  .paper-card{
    position:relative;
    width:min(88vw, 480px);
    min-height: 46vh;
    background: linear-gradient(180deg, var(--paper), var(--paper-2));
    border-radius:4px;
    box-shadow: 0 30px 60px rgba(0,0,0,.55), 0 2px 0 rgba(255,255,255,.15) inset;
    padding: 8vw 8vw;
    display:flex; align-items:center; justify-content:center;
    color:var(--ink);
  }
  .paper-card::before{
    content:'';
    position:absolute; inset:0;
    border-radius:4px;
    background: repeating-linear-gradient(180deg, transparent 0 38px, rgba(59,42,29,.05) 39px);
    pointer-events:none;
  }
  .page-text{
    font-family:var(--font-serif);
    font-style:italic;
    font-size:clamp(1.05rem, 4.4vw, 1.5rem);
    line-height:1.7;
    max-width:34ch;
  }
  .page-text b{ color:var(--wax); font-weight:400; font-style:normal; }

  .paper-card.enter{ animation: page-in .7s cubic-bezier(.22,.9,.32,1) forwards; }
  .paper-card.leave{ animation: page-out .5s cubic-bezier(.55,0,.85,.35) forwards; }
  @keyframes page-in{
    from{ opacity:0; transform: rotateY(10deg) translateX(26px) scale(.97); }
    to{ opacity:1; transform: rotateY(0) translateX(0) scale(1); }
  }
  @keyframes page-out{
    from{ opacity:1; transform: rotateY(0) translateX(0) scale(1); }
    to{ opacity:0; transform: rotateY(-10deg) translateX(-26px) scale(.97); }
  }

  .letter-hint{
    margin-top: 2rem;
    font-family:var(--font-mono);
    font-size:.62rem;
    letter-spacing:.22em;
    text-transform:uppercase;
    color: rgba(243,231,210,.45);
    opacity:0;
    transition:opacity 1s ease;
  }
  .letter-hint.show{ opacity:1; animation:pulse-hint 2.2s ease-in-out infinite; }

  /* ============================================================
     FASE 4 — VELA + FINAL
  ============================================================ */
  #scene-final .cake-wrap{
    position:relative;
    width:min(60vw, 220px);
  }
  .cake-wrap svg{ width:100%; height:auto; display:block; overflow:visible; }
  .flame{
    transform-origin: 50% 100%;
    animation: flicker 2.2s ease-in-out infinite;
  }
  @keyframes flicker{
    0%,100%{ transform:scaleY(1) scaleX(1) rotate(0deg); }
    25%{ transform:scaleY(1.08) scaleX(.94) rotate(-2deg); }
    50%{ transform:scaleY(.96) scaleX(1.05) rotate(1deg); }
    75%{ transform:scaleY(1.05) scaleX(.97) rotate(2deg); }
  }
  .flame.blown{ animation: blow-out .5s ease forwards; }
  @keyframes blow-out{
    0%{ opacity:1; transform:scaleY(1) translateY(0) rotate(0); }
    60%{ opacity:.5; transform:scaleY(1.6) translateY(-6px) rotate(20deg); }
    100%{ opacity:0; transform:scaleY(.2) translateY(-10px) rotate(40deg); }
  }
  .smoke{ opacity:0; }
  .smoke.rise{
    animation: smoke-rise 1.6s ease-out forwards;
  }
  @keyframes smoke-rise{
    0%{ opacity:.55; transform:translateY(0) scale(1); }
    100%{ opacity:0; transform:translateY(-38px) scale(2.4); }
  }

  .blow-hint{
    margin-top:1.6rem;
    font-family:var(--font-mono);
    font-size:.66rem;
    letter-spacing:.22em;
    text-transform:uppercase;
    color: rgba(243,231,210,.55);
    opacity:0;
    transition:opacity .8s ease;
  }
  .blow-hint.show{ opacity:1; animation:pulse-hint 2.2s ease-in-out infinite; }
  .blow-hint.hide{ opacity:0 !important; animation:none; }

  .final-text{
    margin-top: 2.6rem;
    opacity:0; transform:translateY(10px);
    transition:opacity 1.2s ease, transform 1.2s ease;
  }
  .final-text.show{ opacity:1; transform:translateY(0); }
  .final-line1{
    font-family:var(--font-serif);
    font-style:italic;
    font-size:clamp(1.3rem, 5.4vw, 2rem);
    color:var(--paper);
    margin-bottom:.3rem;
  }
  .final-name{
    font-family:var(--font-script);
    font-size:clamp(3rem, 15vw, 5.5rem);
    color:var(--gold);
    text-shadow:0 0 30px rgba(215,162,92,.4);
  }

  .replay{
    margin-top: 2.6rem;
    font-family:var(--font-mono);
    font-size:.63rem;
    letter-spacing:.2em;
    text-transform:uppercase;
    color: rgba(243,231,210,.55);
    background:transparent;
    border:1px solid var(--line);
    border-radius:999px;
    padding:.85em 1.6em;
    opacity:0;
    transition: opacity 1.2s ease, border-color .3s ease, color .3s ease;
    cursor:pointer;
  }
  .replay.show{ opacity:1; }
  .replay:hover{ color:var(--paper); border-color:var(--gold); }

  #embers{ position:fixed; inset:0; z-index:5; pointer-events:none; }

  @media (max-width:380px){
    .whisper{ font-size:clamp(1.05rem, 5.6vw, 1.4rem); }
  }
</style>
</head>
<body>

<canvas id="room"></canvas>
<canvas id="dust"></canvas>
<div class="lamp-glow"></div>
<div class="vignette"></div>

<div id="stage">

  <!-- FASE 1 — INTRO -->
  <section class="scene active" id="scene-intro">
    <p class="whisper" id="whisper-line"></p>
  </section>

  <!-- FASE 2 — ENVELOPE -->
  <section class="scene" id="scene-envelope">
    <div class="envelope-wrap" id="envelope">
      <div class="envelope-back"></div>
      <div class="letter-peek"><span class="name-ink">Alice</span></div>
      <div class="envelope-flap"></div>
      <div class="seal" id="seal">
        <svg viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="46" fill="#9c3430"/>
          <circle cx="50" cy="50" r="46" fill="none" stroke="#6f231f" stroke-width="2" opacity=".6"/>
          <text x="50" y="63" text-anchor="middle" font-family="Georgia, serif" font-size="42" fill="#e9c9a0">A</text>
          <g class="crack" stroke="#3b1614" stroke-width="1.6" fill="none" stroke-linecap="round">
            <path d="M 30 30 L 46 48 L 38 62 L 55 58 L 62 78"/>
            <path d="M 70 26 L 58 50 L 68 60"/>
          </g>
        </svg>
      </div>
    </div>
    <p class="envelope-hint" id="envelope-hint">toque no selo</p>
  </section>

  <!-- FASE 3 — CARTA -->
  <section class="scene" id="scene-letter">
    <p class="page-counter" id="page-counter"></p>
    <div class="paper-card" id="paper-card">
      <p class="page-text" id="page-text"></p>
    </div>
    <p class="letter-hint" id="letter-hint">toque para virar a página</p>
  </section>

  <!-- FASE 4 — FINAL -->
  <section class="scene" id="scene-final">
    <div class="cake-wrap" id="cake">
      <svg viewBox="0 0 120 150">
        <!-- vela -->
        <rect x="55" y="70" width="10" height="34" rx="2" fill="#e8d9bd"/>
        <rect x="55" y="70" width="10" height="34" rx="2" fill="url(#stripes)"/>
        <defs>
          <pattern id="stripes" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(35)">
            <rect width="5" height="10" fill="#d7a25c" opacity=".55"/>
          </pattern>
        </defs>
        <!-- chama -->
        <g id="flame-group">
          <ellipse class="smoke" id="smoke" cx="60" cy="58" rx="6" ry="10" fill="#cfcfcf"/>
          <path class="flame" id="flame" d="M60 40 C 52 52, 52 62, 60 68 C 68 62, 68 52, 60 40 Z" fill="#f2a340"/>
          <path class="flame" d="M60 48 C 56 55, 56 61, 60 65 C 64 61, 64 55, 60 48 Z" fill="#fbdf8f" opacity=".9" style="animation-delay:-.6s"/>
        </g>
        <!-- bolo -->
        <path d="M20 104 Q60 118 100 104 L100 130 Q60 144 20 130 Z" fill="#c98a52"/>
        <path d="M20 104 Q60 118 100 104 Q60 90 20 104 Z" fill="#f3e7d2"/>
        <path d="M20 104 Q60 118 100 104" fill="none" stroke="#9c3430" stroke-width="3" opacity=".5"/>
      </svg>
    </div>
    <p class="blow-hint" id="blow-hint">segure e sopre a vela</p>
    <div class="final-text" id="final-text">
      <p class="final-line1">Feliz aniversário,</p>
      <p class="final-name">Alice ❤️</p>
    </div>
    <button class="replay" id="replay-btn">reviver</button>
  </section>

</div>

<canvas id="embers"></canvas>

<script>
(function(){
"use strict";

/* ============================================================
   0. VIEWPORT FIX
============================================================ */
function setVH(){ document.documentElement.style.setProperty('--vh', (window.innerHeight*0.01)+'px'); }
setVH();
window.addEventListener('resize', setVH);
window.addEventListener('orientationchange', setVH);

/* ============================================================
   1. FUNDO — quarto escuro + poeira flutuando na luz
============================================================ */
const roomCanvas = document.getElementById('room');
const roomCtx = roomCanvas.getContext('2d');
const dustCanvas = document.getElementById('dust');
const dustCtx = dustCanvas.getContext('2d');
let W,H,DPR;
let motes = [];

function resizeBg(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  [roomCanvas, dustCanvas].forEach(c=>{
    c.width = W*DPR; c.height = H*DPR;
    c.style.width = W+'px'; c.style.height = H+'px';
  });
  roomCtx.setTransform(DPR,0,0,DPR,0,0);
  dustCtx.setTransform(DPR,0,0,DPR,0,0);
  buildMotes();
  drawRoom();
}

function drawRoom(){
  const g = roomCtx.createRadialGradient(W*0.5, H*0.36, 10, W*0.5, H*0.5, H*0.9);
  g.addColorStop(0, '#241812');
  g.addColorStop(.5, '#170f11');
  g.addColorStop(1, '#0a0709');
  roomCtx.fillStyle = g;
  roomCtx.fillRect(0,0,W,H);
}

function buildMotes(){
  const count = Math.floor((W*H)/26000);
  motes = [];
  for(let i=0;i<count;i++){
    motes.push({
      x: Math.random()*W,
      y: Math.random()*H,
      r: Math.random()*1.4 + 0.4,
      vy: -(Math.random()*0.18 + 0.05),
      vx: (Math.random()-0.5)*0.12,
      phase: Math.random()*Math.PI*2,
      speed: Math.random()*0.02+0.01,
      base: Math.random()*0.4+0.15
    });
  }
}

function drawDust(){
  dustCtx.clearRect(0,0,W,H);
  for(const m of motes){
    m.x += m.vx; m.y += m.vy; m.phase += m.speed;
    if(m.y < -10) m.y = H+10;
    if(m.x < -10) m.x = W+10;
    if(m.x > W+10) m.x = -10;
    const tw = m.base + Math.sin(m.phase)*0.25;
    dustCtx.beginPath();
    dustCtx.arc(m.x, m.y, m.r, 0, Math.PI*2);
    dustCtx.fillStyle = 'rgba(226,180,120,'+Math.max(0,tw).toFixed(3)+')';
    dustCtx.fill();
  }
  requestAnimationFrame(drawDust);
}

window.addEventListener('resize', resizeBg);
resizeBg();
requestAnimationFrame(drawDust);

/* ============================================================
   2. CONTEÚDO — usando exatamente os textos fornecidos
============================================================ */
const FRASES_INTRO = [
  "Nem toda mensagem precisa de um motivo.",
  "Mas algumas datas merecem uma exceção.",
  "Hoje é uma delas.",
  "Espero que você goste."
];

// blocos da carta, agrupados a partir do texto original
// (linhas em branco no array original = quebra de página)
const PAGES = [
  "Muito obrigado por ser essa pessoa incrível que você é. Quando vi que era seu aniversário, pensei que não podia deixar essa data passar em branco.",
  "Para mim, você foi <b>uma das melhores pessoas</b> que apareceram na minha vida.",
  "Lembro até hoje de quando começamos a conversar mais e de como você sempre me chamava para ficar por perto, quando a gente ficava na quadra com o Henrique, o Flávio e o pessoal, kkkkk.",
  "Mesmo depois de todo esse tempo, você continuou sendo alguém que eu nunca consegui esquecer <i>(no sentido bom, é claro, kkkkk)</i>.",
  "Aliás... preciso admitir uma coisa. Tem gente que fica bonita só em foto. Você consegue ficar <b>bonita de qualquer jeito</b> kkkk. Mas o mais legal nunca foi só isso: vc tem um jeito que faz qualquer conversa ficar melhor, e acho que nem percebe o quão fácil é gostar de conversar com vc.",
  "Fico muito feliz que a gente tenha voltado a conversar. Eu realmente não queria que tudo isso ficasse só nas lembranças.",
  "Espero que seu aniversário seja incrível e que este novo ciclo te traga muita felicidade, saúde, conquistas e momentos especiais. Você merece tudo de bom que a vida puder oferecer."
];

/* ============================================================
   3. MÁQUINA DE ESTADOS
============================================================ */
const stage = document.getElementById('stage');
const sceneIntro = document.getElementById('scene-intro');
const sceneEnvelope = document.getElementById('scene-envelope');
const sceneLetter = document.getElementById('scene-letter');
const sceneFinal = document.getElementById('scene-final');

const whisperEl = document.getElementById('whisper-line');
const envelopeEl = document.getElementById('envelope');
const sealEl = document.getElementById('seal');
const envelopeHintEl = document.getElementById('envelope-hint');
const pageCounterEl = document.getElementById('page-counter');
const paperCardEl = document.getElementById('paper-card');
const pageTextEl = document.getElementById('page-text');
const letterHintEl = document.getElementById('letter-hint');
const flameEl = document.getElementById('flame');
const flameGroupEl = document.getElementById('flame-group');
const smokeEl = document.getElementById('smoke');
const blowHintEl = document.getElementById('blow-hint');
const finalTextEl = document.getElementById('final-text');
const replayBtn = document.getElementById('replay-btn');

let phase = 'intro';
let introIndex = -1;
let pageIndex = -1;
let locked = false;
let autoTimer = null;
let sealOpened = false;
let candleBlown = false;

function clearAuto(){ if(autoTimer){ clearTimeout(autoTimer); autoTimer=null; } }
function switchScene(from, to){ from.classList.remove('active'); to.classList.add('active'); }

/* ---------- FASE 1: INTRO ---------- */
function startIntro(){ nextWhisper(); }

function nextWhisper(){
  clearAuto();
  introIndex++;
  if(introIndex >= FRASES_INTRO.length){ goToEnvelope(); return; }
  whisperEl.classList.remove('show');
  locked = true;
  setTimeout(()=>{
    whisperEl.innerHTML = FRASES_INTRO[introIndex] + '<span class="cursor"></span>';
    requestAnimationFrame(()=> whisperEl.classList.add('show'));
    locked = false;
    autoTimer = setTimeout(nextWhisper, 4200);
  }, 350);
}

/* ---------- FASE 2: ENVELOPE ---------- */
function goToEnvelope(){
  clearAuto();
  switchScene(sceneIntro, sceneEnvelope);
  phase = 'envelope';
  setTimeout(()=> envelopeHintEl.classList.add('show'), 1200);
}

function crackSeal(){
  if(sealOpened) return;
  sealOpened = true;
  envelopeHintEl.classList.remove('show');
  sealEl.classList.add('cracking');
  setTimeout(()=>{
    envelopeEl.classList.add('open');
    locked = true;
    autoTimer = setTimeout(()=>{
      locked = false;
    }, 2800);
  }, 380);
}

/* ---------- FASE 3: CARTA ---------- */
function goToLetter(){
  clearAuto();
  switchScene(sceneEnvelope, sceneLetter);
  phase = 'letter';
  pageIndex = -1;
  nextPage();
}

function nextPage(){
  clearAuto();
  pageIndex++;
  if(pageIndex >= PAGES.length){ goToFinal(); return; }
  letterHintEl.classList.remove('show');
  locked = true;

  if(pageIndex === 0){
    pageTextEl.innerHTML = PAGES[0];
    updateCounter();
    paperCardEl.classList.add('enter');
    setTimeout(()=>{ locked=false; letterHintEl.classList.add('show'); }, 750);
    return;
  }

  paperCardEl.classList.remove('enter');
  paperCardEl.classList.add('leave');
  setTimeout(()=>{
    pageTextEl.innerHTML = PAGES[pageIndex];
    updateCounter();
    paperCardEl.classList.remove('leave');
    void paperCardEl.offsetWidth; // reinicia animação
    paperCardEl.classList.add('enter');
    locked = false;
    letterHintEl.classList.add('show');
  }, 480);
}

function updateCounter(){
  const n = String(pageIndex+1).padStart(2,'0');
  const total = String(PAGES.length).padStart(2,'0');
  pageCounterEl.textContent = 'página ' + n + ' / ' + total;
}

/* ---------- FASE 4: VELA + FINAL ---------- */
function goToFinal(){
  clearAuto();
  letterHintEl.classList.remove('show');
  switchScene(sceneLetter, sceneFinal);
  phase = 'final';
  setTimeout(()=> blowHintEl.classList.add('show'), 900);
}

function blowCandle(){
  if(candleBlown) return;
  candleBlown = true;
  blowHintEl.classList.add('hide');
  flameEl.classList.add('blown');
  document.querySelectorAll('#flame-group .flame').forEach(f=> f.classList.add('blown'));
  smokeEl.classList.add('rise');
  setTimeout(()=>{
    finalTextEl.classList.add('show');
    startEmbers();
    replayBtn.classList.add('show');
  }, 700);
}

/* ---------- CONTROLE GERAL ---------- */
stage.addEventListener('click', function(e){
  if(phase === 'intro'){ if(!locked) nextWhisper(); return; }
  if(phase === 'envelope'){
    if(!sealOpened){ crackSeal(); return; }
    if(!locked){ goToLetter(); }
    return;
  }
  if(phase === 'letter'){ if(!locked) nextPage(); return; }
  if(phase === 'final'){ if(!candleBlown) blowCandle(); return; }
});

replayBtn.addEventListener('click', function(e){
  e.stopPropagation();
  location.reload();
});

window.addEventListener('keydown', function(e){
  if(e.code === 'Space' || e.code === 'Enter'){
    stage.dispatchEvent(new Event('click'));
  }
});

startIntro();

/* ============================================================
   4. CELEBRAÇÃO FINAL — brasas/luzes subindo
============================================================ */
const emberCanvas = document.getElementById('embers');
const emberCtx = emberCanvas.getContext('2d');
let eW, eH, eDPR;
let embers = [];
let celebrating = false;

function resizeEmbers(){
  eDPR = Math.min(window.devicePixelRatio||1, 2);
  eW = window.innerWidth; eH = window.innerHeight;
  emberCanvas.width = eW*eDPR; emberCanvas.height = eH*eDPR;
  emberCanvas.style.width = eW+'px'; emberCanvas.style.height = eH+'px';
  emberCtx.setTransform(eDPR,0,0,eDPR,0,0);
}
window.addEventListener('resize', resizeEmbers);
resizeEmbers();

const EMBER_COLORS = ['#e3703e', '#d7a25c', '#f3e7d2'];

function spawnEmber(){
  return {
    x: eW*0.5 + (Math.random()-0.5)*eW*0.6,
    y: eH*0.62 + Math.random()*eH*0.2,
    r: 1.4 + Math.random()*2.4,
    vy: -(0.5 + Math.random()*1.3),
    vx: (Math.random()-0.5)*0.5,
    color: EMBER_COLORS[Math.floor(Math.random()*EMBER_COLORS.length)],
    alpha: 0.4 + Math.random()*0.6,
    flicker: Math.random()*Math.PI*2
  };
}

function startEmbers(){
  if(celebrating) return;
  celebrating = true;
  for(let i=0;i<40;i++) embers.push(spawnEmber());
  let n=0;
  const iv = setInterval(()=>{
    if(n>70){ clearInterval(iv); return; }
    embers.push(spawnEmber());
    n++;
  }, 130);
  drawEmbers();
}

function drawEmbers(){
  emberCtx.clearRect(0,0,eW,eH);
  for(let i=embers.length-1;i>=0;i--){
    const p = embers[i];
    p.x += p.vx; p.y += p.vy; p.flicker += 0.06;
    const glow = 0.5 + Math.sin(p.flicker)*0.5;
    emberCtx.save();
    emberCtx.globalAlpha = p.alpha * (0.5+glow*0.5);
    emberCtx.fillStyle = p.color;
    emberCtx.shadowColor = p.color;
    emberCtx.shadowBlur = 10;
    emberCtx.beginPath();
    emberCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    emberCtx.fill();
    emberCtx.restore();
    if(p.y < -20) embers.splice(i,1);
  }
  if(celebrating) requestAnimationFrame(drawEmbers);
}

})();
</script>
